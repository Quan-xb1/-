<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资产评估工具导航</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f7fa;
      color: #333;
      line-height: 1.6;
    }
    header {
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      color: white;
      padding: 40px 20px;
      text-align: center;
    }
    header h1 {
      font-size: 2em;
      margin-bottom: 10px;
    }
    header p {
      opacity: 0.9;
      font-size: 1.1em;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 20px;
    }
    .search-box {
      margin-bottom: 30px;
      text-align: center;
    }
    .search-box input {
      width: 100%;
      max-width: 500px;
      padding: 15px 20px;
      font-size: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 30px;
      outline: none;
      transition: border-color 0.3s;
    }
    .search-box input:focus {
      border-color: #1a73e8;
    }
    .category {
      background: white;
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .category h2 {
      font-size: 1.3em;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .category h2 .icon {
      font-size: 1.2em;
    }
    .sites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 12px;
    }
    .site-card {
      display: block;
      background: #f8f9fa;
      padding: 12px 15px;
      border-radius: 8px;
      text-decoration: none;
      color: #333;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .site-card:hover {
      background: #e8f0fe;
      border-color: #1a73e8;
      transform: translateY(-2px);
    }
    .site-card .name {
      font-weight: 600;
      margin-bottom: 4px;
    }
    .site-card .desc {
      font-size: 0.85em;
      color: #666;
    }
    .no-results {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    footer {
      text-align: center;
      padding: 30px;
      color: #999;
      font-size: 0.9em;
    }
    @media (max-width: 600px) {
      .sites-grid {
        grid-template-columns: 1fr;
      }
      header h1 {
        font-size: 1.5em;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>🏛️ 资产评估工具导航</h1>
    <p>收录评估行业常用网站，按分类导航，即点即达</p>
  </header>
  
  <div class="container">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 搜索网站名称或描述..." oninput="filterSites()">
    </div>
    <div id="categories"></div>
  </div>
  
  <footer>
    <p>数据来源：热火集 · 仅供内部使用</p>
  </footer>

  <script>
    let sitesData = null;

    async function loadSites() {
      try {
        const response = await fetch('sites.json');
        sitesData = await response.json();
        renderCategories(sitesData.categories);
      } catch (error) {
        console.error('加载数据失败:', error);
        document.getElementById('categories').innerHTML = 
          '<div class="no-results">数据加载失败，请刷新页面重试</div>';
      }
    }

    function renderCategories(categories) {
      const container = document.getElementById('categories');
      container.innerHTML = categories.map(cat => `
        <div class="category" data-category="${cat.name}">
          <h2><span class="icon">${cat.icon}</span> ${cat.name}</h2>
          <div class="sites-grid">
            ${cat.sites.map(site => `
              <a href="${site.url}" class="site-card" target="_blank" rel="noopener">
                <div class="name">${site.name}</div>
                <div class="desc">${site.desc}</div>
              </a>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    function filterSites() {
      const keyword = document.getElementById('searchInput').value.toLowerCase();
      
      if (!sitesData) return;

      if (!keyword) {
        renderCategories(sitesData.categories);
        return;
      }

      const filtered = sitesData.categories.map(cat => ({
        ...cat,
        sites: cat.sites.filter(site => 
          site.name.toLowerCase().includes(keyword) || 
          site.desc.toLowerCase().includes(keyword)
        )
      })).filter(cat => cat.sites.length > 0);

      if (filtered.length === 0) {
        document.getElementById('categories').innerHTML = 
          '<div class="no-results">未找到匹配结果</div>';
      } else {
        renderCategories(filtered);
      }
    }

    // 页面加载时读取数据
    loadSites();
  </script>
</body>
</html>
